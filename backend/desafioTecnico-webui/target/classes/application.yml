spring:
  application:
    name: desafio-tecnico-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/desafiotecnico}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false

server:
  port: ${PORT:8080}
  error:
    include-message: always

cors:
  allowed-origins:
    - ${BFF_ORIGIN:http://localhost:3001}

management:
  endpoints:
    web:
      exposure:
        include: health,info
