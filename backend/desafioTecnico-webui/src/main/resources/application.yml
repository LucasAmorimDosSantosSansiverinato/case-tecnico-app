spring:
  application:
    name: desafio-tecnico-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/desafiotecnico}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # ORM gerencia o schema — cria ou atualiza as tabelas automaticamente ao subir
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}
  error:
    include-message: always

cors:
  allowed-origins:
    - ${BFF_ORIGIN:http://localhost:3001}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Segredo compartilhado com o BFF para validar o service token JWT (mínimo 32 chars)
service:
  token:
    secret: ${SERVICE_TOKEN_SECRET:changeme-service-secret-32-chars-min}
